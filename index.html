<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>甘肆 | 兽设互动名片</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;color:#2f2b28;background:linear-gradient(135deg,#f8fff2,#fffaf0 45%,#f4d6c7);display:grid;place-items:center;padding:18px}.card{width:min(920px,100%);display:grid;grid-template-columns:1fr 1.1fr;gap:22px;border:1px solid rgba(91,64,47,.16);border-radius:8px;background:rgba(255,250,240,.72);backdrop-filter:blur(18px);box-shadow:0 22px 60px rgba(88,64,42,.18);padding:22px}.art{min-height:360px;border-radius:8px;border:1px dashed rgba(85,115,63,.35);background:linear-gradient(145deg,rgba(146,184,107,.26),rgba(255,242,206,.82));display:grid;place-items:center;text-align:center;padding:24px;color:#5b402f}.art strong{font-size:clamp(3rem,10vw,6rem)}.content{display:grid;align-content:center;gap:20px}.eyebrow{margin:0;color:#55733f;font-weight:800}h1{margin:0;color:#5b402f;font-size:clamp(3.2rem,10vw,6.2rem);line-height:.95}.intro{margin:0;color:#776c62;line-height:1.8}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:6px;border:1px solid rgba(91,64,47,.16);border-radius:8px;background:rgba(255,255,255,.45)}button{min-height:44px;border:0;border-radius:6px;font:inherit;font-weight:800;cursor:pointer;color:#5b402f;background:transparent}.active{color:#fff;background:linear-gradient(135deg,#55733f,#92b86b)}.panel{display:none;min-height:190px;border:1px solid rgba(91,64,47,.16);border-radius:8px;background:rgba(255,255,255,.5);padding:18px}.panel.active{display:block}.info{display:grid;gap:12px}.row{border:1px solid rgba(91,64,47,.11);border-radius:8px;background:rgba(255,250,240,.84);padding:14px}.label{color:#55733f;font-weight:900;font-size:.86rem}.value{margin-top:5px;color:#5b402f;font-weight:900;font-size:1.08rem}.copy{width:max-content;background:#d77882;color:#fff;padding:0 18px}.status{min-height:1.4em;color:#55733f;font-weight:800}@media(max-width:760px){.card{grid-template-columns:1fr;padding:12px}.art{min-height:260px}}
  </style>
</head>
<body>
  <main class="card">
    <section class="art"><div><strong>甘肆</strong><p>形象图之后再补上来</p></div></section>
    <section class="content">
      <div><p class="eyebrow">抹茶巧克力狼</p><h1>甘肆</h1><p class="intro">阳光活泼小狼，正在把自己的故事一点点整理进这张名片里。</p></div>
      <nav class="tabs"><button class="active" data-tab="profile">档案</button><button data-tab="likes">喜好</button><button data-tab="contact">联系</button></nav>
      <section class="panel active" id="profile"><div class="info"><div class="row"><div class="label">名字</div><div class="value">甘肆</div></div><div class="row"><div class="label">物种</div><div class="value">抹茶巧克力狼</div></div><div class="row"><div class="label">性格</div><div class="value">阳光、活泼、小狼能量满满</div></div></div></section>
      <section class="panel" id="likes"><div class="info"><div class="row"><div class="label">喜欢</div><div class="value">还在慢慢补充中</div></div><div class="row"><div class="label">不喜欢</div><div class="value">还在慢慢补充中</div></div></div></section>
      <section class="panel" id="contact"><div class="info"><div class="row"><div class="label">QQ</div><div class="value">2869281872</div></div><button class="copy" id="copy">复制 QQ</button><div class="status" id="status"></div></div></section>
    </section>
  </main>
  <script>
    document.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b===btn));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===btn.dataset.tab));});
    document.querySelector('#copy').onclick=async()=>{try{await navigator.clipboard.writeText('2869281872');status.textContent='已复制 QQ';}catch{status.textContent='请手动复制：2869281872';}};
  </script>
</body>
</html>
